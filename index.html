<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>私人相册</title>

<style>

body{
    margin:0;
    font-family:"Microsoft YaHei";
    background:#f5f5f5;
}

.login{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

input{
    width:220px;
    padding:12px;
    margin:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:12px 24px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#album{
    display:none;
    padding:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.gallery img{
    width:100%;
    border-radius:12px;
}

</style>
</head>

<body>

<div class="login" id="login">

<h2>私人相册</h2>

<input
id="pwd"
type="password"
placeholder="请输入密码">

<button onclick="checkPwd()">
进入
</button>

<p id="msg"></p>

</div>

<div id="album">

<h1>欢迎进入私人相册</h1>

<div class="gallery">

<img src="aaa3d44712434946600fcfbccd2711fb.jpg">

<img src="2.jpg">

<img src="3.jpg">

<img src="4.jpg">

</div>

</div>

<script>

function checkPwd(){

let pwd =
document.getElementById("pwd").value;

if(pwd==="123123"){

document.getElementById("login").style.display="none";

document.getElementById("album").style.display="block";

}else{

document.getElementById("msg").innerHTML="密码错误";

}

}

</script>

</body>
</html>
