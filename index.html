<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>蓝天在线模拟实验</title>

<style>
body{
    background:black;
    color:#00ff00;
    font-family:Consolas;
    text-align:center;
    padding-top:50px;
}

button{
    background:#111;
    color:#00ff00;
    border:1px solid #00ff00;
    padding:10px 20px;
    margin:10px;
    cursor:pointer;
}

#result{
    margin-top:30px;
    font-size:24px;
}
</style>
</head>

<body>

<h1>老姐你好</h1>

<p>咋样，NB不</p>
<p>滴滴滴</p>
<p>蓝天状态：在线</p>

<button onclick="eventGenerate()">
推演事件
</button>

<div id="result">
等待点击
</div>

<script>

function eventGenerate(){

let events=[

"1",

"2",

"3",

"4",

"5",

"6",

"OK"

];

let random=
events[Math.floor(Math.random()*events.length)];

document.getElementById("result").innerHTML=random;

}

</script>

</body>
</html>
